<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'none'; frame-ancestors 'none'">
<meta name="robots" content="noindex">
<title>Harlem House — Vendor</title>
<link rel="icon" type="image/webp" href="/assets/img/real/logo.webp">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0b09;--bg-2:#12100c;--surface:#171511;--surface-2:#1f1c16;--surface-3:#272318;--cream:#f6f1e6;--muted:#b9b09c;--muted-2:#8d8674;--gold:#f2b705;--gold-deep:#a87e04;--green:#34d058;--ember:#dc2626;--amber:#f59e0b;--blue:#5aa9ff;--line:rgba(246,241,230,.11);--line-soft:rgba(246,241,230,.06);--r:16px;--r-lg:20px;--ease:cubic-bezier(.22,.7,.25,1);--spring:cubic-bezier(.3,1.4,.4,1);--sb:248px;--sb-min:72px;--bar:62px;--foot:46px;--glass-hi:rgba(255,255,255,.06)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(80% 55% at 88% -8%,rgba(242,183,5,.05),transparent 60%),var(--bg);color:var(--cream);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:7px}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:8px;border:2px solid var(--bg)}
  .brand-logo{mix-blend-mode:screen}

  /* ---------- shell + sidebar (#4) ---------- */
  .scrim{position:fixed;inset:0;z-index:28;background:rgba(5,4,3,.6);backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:30;width:var(--sb);background:linear-gradient(180deg,var(--surface),var(--bg-2));border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:width .3s var(--ease),transform .3s var(--ease)}
  .sb-head{display:flex;align-items:center;gap:11px;min-height:var(--bar);padding:12px 14px;border-bottom:1px solid var(--line-soft)}
  .sb-head img{height:36px;flex:none}
  .sb-head .ttl{font-family:'Anton',sans-serif;font-size:1.05rem;line-height:.9;white-space:nowrap;transition:opacity .2s}
  .sb-head .ttl b{display:block;color:var(--gold);font-size:.58rem;letter-spacing:.26em;margin-top:3px}
  .sb-collapse{margin-left:auto;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;flex:none;transition:.2s}
  .sb-collapse:hover{color:var(--gold);border-color:var(--gold)}
  .sb-nav{padding:14px 12px;display:flex;flex-direction:column;gap:7px}
  .sb-sec{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);padding:4px 10px;white-space:nowrap;transition:opacity .2s}
  .navlink{display:flex;align-items:center;gap:13px;padding:12px;border-radius:12px;color:var(--cream);font-weight:600;font-size:.95rem;white-space:nowrap;position:relative;transition:background .2s,color .2s}
  .navlink svg{flex:none}.navlink .lbl{flex:1;text-align:left;transition:opacity .2s}
  .navlink .ct{flex:none;min-width:24px;height:22px;border-radius:50px;background:var(--surface-3);color:var(--muted);font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;padding:0 7px;transition:opacity .2s}
  .navlink:hover{background:var(--surface-2);color:var(--gold)}
  .navlink.active{background:linear-gradient(135deg,rgba(242,183,5,.16),rgba(242,183,5,.05));color:var(--gold)}
  .navlink.active::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--gold)}
  .navlink.active .ct{background:var(--gold);color:#1a1305}
  .sb-spacer{flex:1}
  .support{border-top:1px solid var(--line-soft);padding:14px 16px calc(14px + env(safe-area-inset-bottom));font-size:.8rem}
  .support h5{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:9px;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .support .sup{display:flex;align-items:center;gap:9px;padding:5px 0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
  .support .sup svg{flex:none;color:var(--muted-2)}
  .support a.sup:hover{color:var(--gold)}
  .support .grp{margin-bottom:7px}
  .shell.collapsed .sidebar{width:var(--sb-min)}
  .shell.collapsed .ttl,.shell.collapsed .sb-sec,.shell.collapsed .navlink .lbl,.shell.collapsed .navlink .ct,.shell.collapsed .support h5 span,.shell.collapsed .support .sup span{opacity:0;pointer-events:none}
  .shell.collapsed .sb-head{justify-content:center;padding:12px 8px}
  .shell.collapsed .sb-collapse{margin-left:0}
  .shell.collapsed .navlink{justify-content:center}
  .shell.collapsed .support{padding:14px 8px;text-align:center}.shell.collapsed .support .sup{justify-content:center}

  /* ---------- main ---------- */
  .main{margin-left:var(--sb);min-height:100vh;display:flex;flex-direction:column;transition:margin-left .3s var(--ease)}
  .shell.collapsed .main{margin-left:var(--sb-min)}
  header.bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:11px;flex-wrap:wrap;min-height:var(--bar);padding:9px clamp(12px,2.4vw,24px);background:rgba(12,11,9,.85);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);border-bottom:1px solid var(--line);box-shadow:inset 0 1px 0 var(--glass-hi)}
  .hamb{display:none;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);color:var(--cream);align-items:center;justify-content:center;flex:none}
  .bar-logo{height:34px;flex:none}
  .brand{display:flex;flex-direction:column;line-height:1.05;min-width:0}
  .brand .sn{font-family:'Anton',sans-serif;font-size:1.3rem;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .sa{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .spacer{flex:1}
  .conn{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;color:var(--muted)}
  .conn .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .conn.live .dot{background:var(--green);box-shadow:0 0 0 4px rgba(52,208,88,.16);animation:pulse 2.2s ease-in-out infinite} .conn.live b{color:var(--green)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(52,208,88,.16)}50%{box-shadow:0 0 0 7px rgba(52,208,88,.04)}}
  .bell{position:relative;border:1px solid var(--line);background:var(--surface-2);border-radius:10px;padding:8px 11px;font-size:1rem}
  .bell .n{position:absolute;top:-7px;right:-7px;background:var(--ember);color:#fff;font-size:.66rem;font-weight:700;min-width:18px;height:18px;border-radius:50px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .who{font-size:.8rem;color:var(--muted);display:inline-flex;align-items:center;gap:8px}
  .who .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1a1305;font-family:'Anton',sans-serif;font-size:.85rem;display:flex;align-items:center;justify-content:center}
  .who b{color:var(--cream)}
  .btn{border:1px solid var(--line);background:var(--surface-2);border-radius:10px;padding:8px 13px;font-weight:600;font-size:.82rem;transition:.2s}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  main{flex:1;padding:clamp(14px,2.4vw,24px) clamp(12px,2.4vw,24px) calc(var(--foot) + 18px);max-width:1480px;width:100%;margin:0 auto}
  .view{animation:fade .35s var(--ease) both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  h2.sec{font-family:'Anton',sans-serif;font-size:1.25rem;text-transform:uppercase;margin:4px 2px 16px;letter-spacing:.03em;display:flex;align-items:baseline;gap:10px}
  h2.sec span{font-family:'Space Grotesk';font-size:.82rem;font-weight:600;color:var(--muted);text-transform:none;letter-spacing:0}
  .empty{color:var(--muted);padding:9vh 10px;text-align:center}

  /* ---------- KPI strip + toolbar + order aging (vendor enhancements) ---------- */
  .statbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;margin:0 0 16px}
  .stat{background:linear-gradient(165deg,var(--surface),var(--surface-2));border:1px solid var(--line-soft);border-radius:14px;padding:13px 15px;box-shadow:inset 0 1px 0 var(--glass-hi);transition:transform .25s var(--ease),border-color .25s}
  .stat:hover{transform:translateY(-2px);border-color:var(--line)}
  .stat .sv{font-family:'Anton',sans-serif;font-size:1.7rem;line-height:1;font-variant-numeric:tabular-nums}
  .stat .sl{font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .stat.gold .sv{color:var(--gold)} .stat.amber .sv{color:var(--amber)} .stat.green .sv{color:var(--green)} .stat.blue .sv{color:var(--blue)}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:0 0 16px}
  .search{flex:1;min-width:190px;position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:13px;color:var(--muted-2);pointer-events:none}
  .search input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;color:var(--cream);font:inherit;font-size:.9rem;padding:11px 12px 11px 40px;min-height:44px;transition:border-color .2s}
  .search input:focus{outline:none;border-color:var(--gold)}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
  .seg button{padding:8px 14px;border-radius:9px;font-weight:600;font-size:.82rem;color:var(--muted);min-height:38px;transition:background .2s,color .2s}
  .seg button.on{background:var(--gold);color:#1a1305}
  .sound-btn{border:1px solid var(--line);background:var(--surface-2);border-radius:10px;padding:8px 11px;font-size:1rem;color:var(--muted);transition:.2s}
  .sound-btn.on{color:var(--gold);border-color:rgba(242,183,5,.4)}
  .age{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--muted);background:var(--surface-3);border:1px solid var(--line-soft);border-radius:50px;padding:3px 8px}
  .age.warn{color:var(--amber);background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35)}
  .age.urgent{color:#ff9b9b;background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.45)}
  .card.warn{border-color:rgba(245,158,11,.4)} .card.urgent{border-color:rgba(220,38,38,.5)}
  .card.urgent::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;box-shadow:inset 0 0 0 1.5px rgba(220,38,38,.35);animation:urg 1.8s ease-in-out infinite}
  @keyframes urg{0%,100%{opacity:.35}50%{opacity:.9}}
  .skel{background:linear-gradient(165deg,var(--surface),var(--surface-2));border:1px solid var(--line-soft);border-radius:var(--r-lg);height:240px;position:relative;overflow:hidden}
  .skel::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 20%,rgba(255,255,255,.045) 50%,transparent 80%);animation:shimmer 1.3s infinite}
  @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

  /* ---------- live order cards (#2) ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
  .card{background:linear-gradient(168deg,var(--surface),var(--surface-2));border:1px solid var(--line-soft);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 16px 44px -28px rgba(0,0,0,.85),inset 0 1px 0 var(--glass-hi);position:relative;transition:transform .25s var(--ease),border-color .25s,box-shadow .25s;animation:cardIn .4s var(--ease) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;z-index:1}
  .card.s-PENDING::before{background:linear-gradient(180deg,var(--amber),transparent)}
  .card.s-ACCEPTED::before,.card.s-OUT_FOR_DELIVERY::before{background:linear-gradient(180deg,var(--blue),transparent)}
  .card.s-COOKING::before{background:linear-gradient(180deg,var(--gold),transparent)}
  .card.s-READY::before,.card.s-DELIVERED::before{background:linear-gradient(180deg,var(--green),transparent)}
  .card:hover{transform:translateY(-3px);border-color:var(--line);box-shadow:0 26px 60px -30px rgba(0,0,0,.9),inset 0 1px 0 var(--glass-hi)}
  .card.fresh{animation:pop .55s var(--spring);border-color:rgba(242,183,5,.6)}
  @keyframes pop{0%{transform:scale(.96);box-shadow:0 0 0 3px rgba(242,183,5,.5)}100%{transform:scale(1)}}
  .ctop{display:flex;align-items:center;gap:9px;padding:14px 16px 11px}
  .ref{font-family:'Anton',sans-serif;font-size:1.25rem;color:var(--gold);letter-spacing:.01em}
  .badge{font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:50px}
  .b-mode.delivery{background:rgba(90,169,255,.15);color:var(--blue);border:1px solid rgba(90,169,255,.3)} .b-mode.collection{background:rgba(242,183,5,.14);color:var(--gold);border:1px solid rgba(242,183,5,.3)}
  .when{margin-left:auto;font-size:.72rem;color:var(--muted);text-align:right;line-height:1.35}
  .st{display:inline-flex;align-items:center;gap:5px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:4px 9px;border-radius:50px;margin:0 16px 12px}
  .st-PENDING{background:rgba(245,158,11,.16);color:var(--amber)} .st-ACCEPTED{background:rgba(90,169,255,.16);color:var(--blue)}
  .st-COOKING{background:rgba(242,183,5,.16);color:var(--gold)} .st-READY{background:rgba(52,208,88,.16);color:var(--green)}
  .st-OUT_FOR_DELIVERY{background:rgba(90,169,255,.16);color:var(--blue)} .st-DELIVERED{background:rgba(52,208,88,.16);color:var(--green)}
  .st-COMPLETED{background:rgba(140,134,116,.2);color:var(--muted)} .st-REJECTED{background:rgba(220,38,38,.16);color:#ff9b9b}
  .cbody{padding:0 16px 14px}
  .pchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px}
  .paid,.unpaid{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:50px;padding:3px 9px}
  .paid{color:var(--green);border:1px solid rgba(52,208,88,.4)} .unpaid{color:var(--amber);border:1px solid rgba(245,158,11,.4)}
  .drv{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:50px;padding:3px 9px;color:var(--blue);border:1px solid rgba(90,169,255,.4)}
  .cust{margin:2px 0 10px} .cust b{color:var(--cream);font-size:.95rem} .cust .row{color:var(--muted);font-size:.8rem;margin-top:2px}
  .items{display:flex;flex-direction:column;gap:6px;margin:11px 0;padding:11px 0;border-top:1px dashed var(--line-soft);border-bottom:1px dashed var(--line-soft)}
  .li{display:flex;gap:9px;font-size:.86rem}.li .q{color:var(--gold);font-weight:700;min-width:26px}.li .nm{flex:1}.li .lt{color:var(--muted)}
  .tot{display:flex;justify-content:space-between;align-items:center;padding-top:11px;font-weight:600;color:var(--muted)}.tot b{font-family:'Anton',sans-serif;color:var(--gold);font-size:1.3rem}
  .assign{display:flex;gap:7px;align-items:center;margin:11px 0 2px;font-size:.8rem;color:var(--muted)}
  .assign select{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;color:var(--cream);font:inherit;font-size:.82rem;padding:9px}
  .acts{display:flex;gap:8px;flex-wrap:wrap;padding:13px 16px;border-top:1px solid var(--line-soft);background:rgba(0,0,0,.18)}
  .acts button{flex:1;min-width:92px;min-height:42px;border-radius:11px;padding:0 12px;font-weight:700;font-size:.84rem;transition:transform .15s var(--spring),filter .2s,background .2s}
  .acts button:active{transform:scale(.96)}
  .a-accept{background:var(--green);color:#06320f;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
  .a-reject{background:transparent;border:1px solid rgba(220,38,38,.5);color:#ff9b9b}
  .a-go{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1a1305;box-shadow:inset 0 1px 0 rgba(255,255,255,.3)}
  .a-go:hover{filter:brightness(1.05)}
  .a-muted{background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}

  /* ---------- completed orders (#3) — more spacious ---------- */
  .done-grid{display:grid;grid-template-columns:1fr;gap:16px}
  @media (min-width:720px){.done-grid{grid-template-columns:repeat(auto-fill,minmax(430px,1fr))}}
  .dcard{background:linear-gradient(168deg,var(--surface),var(--surface-2));border:1px solid var(--line-soft);border-radius:var(--r-lg);padding:clamp(18px,2.2vw,24px);position:relative;overflow:hidden;box-shadow:0 16px 44px -30px rgba(0,0,0,.8),inset 0 1px 0 var(--glass-hi);animation:cardIn .4s var(--ease) both;transition:transform .25s var(--ease),border-color .25s,box-shadow .25s}
  .dcard:hover{transform:translateY(-3px);border-color:var(--line)}
  .dcard::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,transparent,rgba(52,208,88,.5),transparent)}
  .dtop{display:flex;align-items:center;gap:12px;margin-bottom:7px}
  .dtop .chk{width:30px;height:30px;border-radius:50%;background:rgba(52,208,88,.14);border:1px solid rgba(52,208,88,.4);color:var(--green);display:flex;align-items:center;justify-content:center;flex:none;font-weight:700}
  .dtop.rej .chk{background:rgba(220,38,38,.14);border-color:rgba(220,38,38,.4);color:#ff9b9b}
  .dtop .ref{font-size:1.4rem}
  .dtop .badge{margin-left:auto}
  .dcust{font-weight:600;font-size:1.05rem;margin-bottom:4px}
  .dmeta{font-size:.8rem;color:var(--muted);margin-bottom:15px;display:flex;flex-wrap:wrap;gap:5px 10px;align-items:center}
  .dmeta .dot{width:3px;height:3px;border-radius:50%;background:var(--muted-2)}
  .ditems{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;padding:14px 0;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
  .ditems .li{font-size:.94rem}
  .dfoot{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .dtotal{font-family:'Anton',sans-serif;font-size:1.7rem;color:var(--gold)}.dtotal small{display:block;font-family:'Space Grotesk';font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .dppl{margin-left:auto;display:flex;flex-direction:column;gap:6px;align-items:flex-end;font-size:.8rem;color:var(--muted)}
  .dppl .pp{display:inline-flex;align-items:center;gap:8px}.dppl .pp .av{width:24px;height:24px;border-radius:50%;background:var(--surface-3);color:var(--cream);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center}
  .dppl .pp.drv .av{background:rgba(90,169,255,.2);color:var(--blue)}

  /* ---------- revenue footer (#8) ---------- */
  .revbar{position:fixed;left:var(--sb);right:0;bottom:0;z-index:18;min-height:var(--foot);display:flex;align-items:center;gap:13px;padding:7px clamp(12px,2.4vw,24px);background:linear-gradient(180deg,rgba(12,11,9,.5),rgba(12,11,9,.8));backdrop-filter:blur(13px) saturate(1.3);-webkit-backdrop-filter:blur(13px) saturate(1.3);border-top:1px solid var(--line);transition:left .3s var(--ease)}
  .shell.collapsed .revbar{left:var(--sb-min)}
  .revbar .rl{font-size:.7rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
  .revbar .rd{font-size:.66rem;color:var(--muted-2)}
  .revbar .ra{margin-left:auto;font-family:'Anton',sans-serif;font-size:1.45rem;color:var(--gold);font-variant-numeric:tabular-nums;text-shadow:0 0 18px rgba(242,183,5,.18)}
  .revbar .ro{font-size:.7rem;color:var(--muted);font-variant-numeric:tabular-nums}

  /* ---------- notifications drawer + toast ---------- */
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(360px,100%);background:var(--surface);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .3s var(--ease);z-index:45;display:flex;flex-direction:column}
  .drawer.open{transform:none}
  .drawer h3{font-family:'Anton',sans-serif;text-transform:uppercase;padding:16px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center}
  .drawer .list{flex:1;overflow:auto;padding:10px 14px}
  .note{border-bottom:1px dashed var(--line-soft);padding:11px 2px;font-size:.86rem}.note .t{color:var(--muted);font-size:.7rem;margin-top:2px}
  .toast{position:fixed;left:50%;bottom:calc(var(--foot) + 16px);transform:translateX(-50%) translateY(16px);background:var(--gold);color:#1a1305;font-weight:700;padding:11px 18px;border-radius:50px;opacity:0;transition:.25s;z-index:50;box-shadow:0 14px 40px -10px rgba(0,0,0,.7);display:flex;align-items:center;gap:8px}
  .toast.show{opacity:1;transform:translateX(-50%)}

  @media (max-width:900px){
    .sidebar{transform:translateX(-102%);box-shadow:-30px 0 70px rgba(0,0,0,.6)}
    .shell.navopen .sidebar{transform:none}.shell.navopen .scrim{opacity:1;visibility:visible}
    .main{margin-left:0!important}.revbar{left:0!important}
    .hamb{display:flex}.sb-collapse{display:none}
    .shell.collapsed .sidebar{width:var(--sb)} .shell.collapsed .ttl,.shell.collapsed .navlink .lbl,.shell.collapsed .navlink .ct,.shell.collapsed .sb-sec,.shell.collapsed .support h5 span,.shell.collapsed .support .sup span{opacity:1}
  }
  @media (max-width:560px){.brand .sa{display:none}.who b{display:none}.conn{display:none}.revbar .ro{display:none}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.08ms!important}}
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" aria-label="Vendor navigation">
    <div class="sb-head">
      <img src="/assets/img/real/logo.webp" class="brand-logo" alt="Harlem House">
      <span class="ttl">HARLEM<b>VENDOR</b></span>
      <button class="sb-collapse" id="sbCollapse" type="button" aria-label="Collapse sidebar" title="Collapse">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">Orders</div>
      <button class="navlink active" data-tab="live" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16M4 12h16M4 19h10"/></svg>
        <span class="lbl">Live Orders</span><span class="ct" id="ctLive">0</span>
      </button>
      <button class="navlink" data-tab="done" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="lbl">Completed Orders</span><span class="ct" id="ctDone">0</span>
      </button>
    </nav>
    <div class="sb-spacer"></div>
    <div class="support">
      <h5><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18.4 14.5a8 8 0 1 0-2.9 2.9l3 .8a.6.6 0 0 0 .7-.7z"/></svg> <span>IT Support</span></h5>
      <div class="grp">
        <a class="sup" href="mailto:support1@email.com"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg> <span>support1@email.com</span></a>
        <a class="sup" href="mailto:support2@email.com"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg> <span>support2@email.com</span></a>
      </div>
      <div class="grp">
        <a class="sup" href="tel:+440000000001"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7A2 2 0 0 1 22 16.9z"/></svg> <span>Support phone 1</span></a>
        <a class="sup" href="tel:+440000000002"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7A2 2 0 0 1 22 16.9z"/></svg> <span>Support phone 2</span></a>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="bar">
      <button class="hamb" id="hamb" type="button" aria-label="Open menu"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <img src="/assets/img/real/logo.webp" class="brand-logo bar-logo" alt="Harlem House">
      <div class="brand"><span class="sn" id="storeName">—</span><span class="sa" id="storeAddr">—</span></div>
      <span class="spacer"></span>
      <span class="conn" id="conn"><span class="dot"></span> <b>…</b></span>
      <button class="sound-btn on" id="soundBtn" type="button" title="New-order sound on/off" aria-label="Toggle sound">🔊</button>
      <button class="bell" id="bell" title="Notifications">🔔<span class="n" id="bellN" style="display:none">0</span></button>
      <span class="who" id="who"></span>
      <button class="btn" id="logout">Log out</button>
    </header>

    <main>
      <section class="view" id="liveView">
        <h2 class="sec">Live order queue <span id="liveSub"></span></h2>
        <div class="statbar" id="statbar"></div>
        <div class="toolbar">
          <label class="search"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input id="searchInp" type="search" placeholder="Search ref, customer or item…" aria-label="Search orders"></label>
          <div class="seg" id="typeSeg" role="group" aria-label="Filter by type">
            <button type="button" data-type="all" class="on">All</button>
            <button type="button" data-type="Collection">Collection</button>
            <button type="button" data-type="Delivery">Delivery</button>
          </div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="empty" id="empty">No active orders. New orders appear here instantly.</div>
      </section>
      <section class="view" id="doneView" hidden>
        <h2 class="sec">Completed orders <span id="doneSub"></span></h2>
        <div class="done-grid" id="doneGrid"></div>
        <div class="empty" id="doneEmpty">No completed orders yet today.</div>
      </section>
    </main>

    <footer class="revbar">
      <span class="rl">Total Revenue Today</span>
      <span class="rd" id="revDate">—</span>
      <span class="ra" id="revAmt">£0.00</span>
      <span class="ro" id="revOrders"></span>
    </footer>
  </div>
</div>

<div class="drawer" id="drawer"><h3>Notifications <button class="btn" id="closeN">✕</button></h3><div class="list" id="noteList"></div></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var TOKEN,ROLE,NAME,STORE;
  try{TOKEN=sessionStorage.getItem('hh-staff-token');ROLE=sessionStorage.getItem('hh-staff-role');NAME=sessionStorage.getItem('hh-staff-name');STORE=sessionStorage.getItem('hh-staff-store');}catch(e){}
  if(!TOKEN||(ROLE!=='vendor'&&ROLE!=='owner')){location.replace('/login');return;}
  var $=function(s){return document.querySelector(s);};
  var $$=function(s){return [].slice.call(document.querySelectorAll(s));};
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function gbp(n){return '£'+(Math.round(Number(n)*100)/100).toFixed(2);}
  function tm(iso){try{return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
  function initials(n){return String(n||'?').trim().charAt(0).toUpperCase();}
  function api(path,opts){opts=opts||{};opts.headers=Object.assign({'Authorization':'Bearer '+TOKEN},opts.headers||{});if(opts.body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(opts.body);opts.method=opts.method||'POST';}return fetch(path,opts).then(function(r){if(r.status===401){location.replace('/login');throw new Error('401');}return r.json();});}

  /* ---- store branding (#5) + logged-in user (#6) ---- */
  var STORES={ stmarys:{name:"St Mary's Road", addr:"156 St Mary's Rd · S2 4AX"}, infirmary:{name:"Infirmary Road", addr:"158 Infirmary Rd · S6 3DH"} };
  var brand = STORES[STORE] || (ROLE==='owner' ? {name:'All Stores', addr:'Owner · master view'} : {name:'Vendor', addr:''});
  $('#storeName').textContent=brand.name;
  $('#storeAddr').textContent=brand.addr;
  document.title='Harlem House · '+brand.name;
  $('#who').innerHTML='<span class="av">'+esc(initials(NAME))+'</span><b>'+esc(NAME||'')+'</b>';
  $('#logout').addEventListener('click',function(){api('/api/auth/logout',{method:'POST'}).catch(function(){});try{sessionStorage.clear();}catch(e){}location.replace('/login');});

  /* ---- revenue footer date (#8) ---- */
  $('#revDate').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  function isToday(iso){try{return new Date(iso).toDateString()===new Date().toDateString();}catch(e){return false;}}

  var orders={}, completed=[], drivers=[], toastT, tab='live', filterType='all', searchQ='', soundOn=true;
  try{ soundOn = sessionStorage.getItem('hh-vendor-sound')!=='off'; }catch(e){}
  function toast(m){var t=$('#toast');t.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>'+esc(m);t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2200);}
  function beep(){if(!soundOn)return;try{var C=window.AudioContext||window.webkitAudioContext;if(!C)return;var ac=beep._a||(beep._a=new C());var o=ac.createOscillator(),g=ac.createGain();o.frequency.value=880;g.gain.value=.05;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.2);o.stop(ac.currentTime+.22);}catch(e){}}

  /* ---- live cards (#2) ---- */
  function nextActions(o){
    var a=[];
    if(o.status==='PENDING'){a.push({t:'Accept',to:'ACCEPTED',c:'a-accept'},{t:'Reject',to:'REJECTED',c:'a-reject'});}
    else if(o.status==='ACCEPTED'){a.push({t:'Start cooking',to:'COOKING',c:'a-go'});}
    else if(o.status==='COOKING'){a.push({t:'Mark ready',to:'READY',c:'a-go'});}
    else if(o.status==='READY'){ if(o.mode==='Collection') a.push({t:'Handed over · complete',to:'COMPLETED',c:'a-go'}); else a.push({t:'Awaiting driver pickup',to:'',c:'a-muted'}); }
    else { a.push({t:o.status.replace(/_/g,' '),to:'',c:'a-muted'}); }
    return a;
  }
  function driverName(id){var d=drivers.find(function(x){return x.id===id;});return d?d.name:(id?'assigned':'');}
  function cardHTML(o){
    var acts=nextActions(o).map(function(a){return '<button class="'+a.c+'"'+(a.to?' data-to="'+a.to+'"':' disabled')+' data-id="'+o.id+'">'+esc(a.t)+'</button>';}).join('');
    var dest=o.mode==='Delivery'?(esc(o.postcode||'')+' · '+esc(o.eta||'')):(esc(o.branch||'')+' · '+esc(o.eta||''));
    var assign='';
    if(o.mode==='Delivery' && ['ACCEPTED','COOKING','READY'].indexOf(o.status)>-1){
      var opts=drivers.map(function(d){return '<option value="'+d.id+'"'+(d.id===o.driverId?' selected':'')+'>'+esc(d.name)+' ('+d.activeJobs+')</option>';}).join('');
      assign='<div class="assign">🛵 <select data-assign="'+o.id+'"><option value="">— assign driver —</option>'+opts+'</select></div>';
    }
    return '<div class="ctop"><span class="ref">'+esc(o.ref)+'</span>'+
        '<span class="badge b-mode '+(o.mode==='Delivery'?'delivery':'collection')+'">'+esc(o.mode)+'</span>'+
        '<span class="age '+urgencyOf(o)+'">⏱ '+ageStr(ageMin(o))+'</span>'+
        '<span class="when">'+tm(o.placedAt)+'<br>'+dest+'</span></div>'+
      '<span class="st st-'+o.status+'">'+esc(o.status.replace(/_/g,' '))+'</span>'+
      '<div class="cbody">'+
        '<div class="pchips">'+(o.paid?'<span class="paid">✓ Paid</span>':'<span class="unpaid">Unpaid</span>')+(o.driverId?'<span class="drv">🛵 '+esc(driverName(o.driverId))+'</span>':'')+(o.callback?'<span class="unpaid">Call back</span>':'')+'</div>'+
        '<div class="cust"><b>'+esc(o.name)+'</b><div class="row">'+esc(o.phone)+(o.address?' · '+esc(o.address):'')+'</div></div>'+
        '<div class="items">'+o.items.map(function(i){return '<div class="li"><span class="q">'+i.qty+'×</span><span class="nm">'+esc(i.name)+'</span><span class="lt">'+gbp(i.lineTotal)+'</span></div>';}).join('')+'</div>'+
        '<div class="tot"><span>Total</span><b>'+gbp(o.subtotal)+'</b></div>'+
        assign+
      '</div>'+
      '<div class="acts">'+acts+'</div>';
  }
  var ACTIVE=['PENDING','ACCEPTED','COOKING','READY','OUT_FOR_DELIVERY','DELIVERED'];
  function renderLive(){
    var all=Object.keys(orders).filter(function(id){return ACTIVE.indexOf(orders[id].status)>-1;});
    var ids=all.filter(function(id){return matchesFilter(orders[id]);});
    ids.sort(function(a,b){return new Date(orders[a].placedAt)-new Date(orders[b].placedAt);});
    var g=$('#grid'); g.innerHTML='';
    ids.forEach(function(id,i){var o=orders[id];var u=urgencyOf(o);
      var el=document.createElement('div');el.className='card s-'+o.status+(u?' '+u:'')+(o._fresh?' fresh':'');
      el.dataset.id=id;el.style.animationDelay=Math.min(i*40,300)+'ms';o._fresh=false;el.innerHTML=cardHTML(o);g.appendChild(el);});
    var empty=$('#empty');
    if(!ids.length){ empty.style.display=''; empty.textContent = all.length ? 'No orders match your search or filter.' : 'No active orders. New orders appear here instantly.'; }
    else empty.style.display='none';
    $('#ctLive').textContent=all.length;
    $('#liveSub').textContent=all.length?(all.length+(all.length===1?' active order':' active orders')+(ids.length!==all.length?' · '+ids.length+' shown':'')):'';
    renderStats();
  }

  /* ---- completed cards (#3) ---- */
  function doneCardHTML(o){
    var rej=o.status==='REJECTED';
    var when=(o.completedAt?'Completed ':'Closed ')+tm(o.completedAt||o.placedAt);
    var bits=[when, esc(o.mode)];
    if(o.mode==='Delivery'&&o.address) bits.push(esc(o.address)+(o.postcode?' · '+esc(o.postcode):''));
    else if(o.branch) bits.push(esc(o.branch));
    if(o.phone) bits.push(esc(o.phone));
    var meta=bits.join('<span class="dot"></span>');
    var ppl='';
    if(o.driverId) ppl+='<span class="pp drv"><span class="av">'+esc(initials(driverName(o.driverId)))+'</span>Delivered by '+esc(driverName(o.driverId))+'</span>';
    return '<div class="dtop'+(rej?' rej':'')+'"><span class="chk">'+(rej?'✕':'✓')+'</span><span class="ref">'+esc(o.ref)+'</span>'+
        '<span class="badge b-mode '+(o.mode==='Delivery'?'delivery':'collection')+'">'+esc(o.mode)+'</span></div>'+
      '<div class="dcust">'+esc(o.name)+'</div>'+
      '<div class="dmeta">'+meta+'</div>'+
      '<div class="ditems">'+o.items.map(function(i){return '<div class="li"><span class="q">'+i.qty+'×</span><span class="nm">'+esc(i.name)+'</span><span class="lt">'+gbp(i.lineTotal)+'</span></div>';}).join('')+'</div>'+
      '<div class="dfoot"><span class="dtotal">'+gbp(o.subtotal)+'<small>Order total · '+(o.paid?'paid':'unpaid')+'</small></span>'+
        (ppl?'<span class="dppl">'+ppl+'</span>':'')+'</div>';
  }
  function renderDone(){
    var list=completed.slice().sort(function(a,b){return new Date(b.completedAt||b.placedAt)-new Date(a.completedAt||a.placedAt);});
    var g=$('#doneGrid'); g.innerHTML='';
    list.forEach(function(o,i){var el=document.createElement('div');el.className='dcard';el.style.animationDelay=Math.min(i*40,300)+'ms';el.innerHTML=doneCardHTML(o);g.appendChild(el);});
    $('#doneEmpty').style.display=list.length?'none':'';
    $('#ctDone').textContent=completed.length; $('#doneSub').textContent=list.length?(list.length+' total'):'';
    renderRevenue(); renderStats();
  }
  function renderRevenue(){
    var sum=0,n=0;
    completed.forEach(function(o){ if(o.status==='COMPLETED' && isToday(o.completedAt||o.placedAt)){ sum+=Number(o.subtotal)||0; n++; } });
    $('#revAmt').textContent=gbp(sum);
    $('#revOrders').textContent=n+(n===1?' order':' orders');
  }

  /* ---- order aging + urgency escalation (kitchen-display essential) ---- */
  function ageMin(o){return Math.max(0,Math.floor((Date.now()-new Date(o.placedAt).getTime())/60000));}
  function ageStr(m){return m<60?m+'m':Math.floor(m/60)+'h '+(m%60)+'m';}
  var URG={PENDING:[3,6],ACCEPTED:[4,8],COOKING:[8,15],READY:[5,12]};   // [warn, urgent] minutes per status
  function urgencyOf(o){var t=URG[o.status];if(!t)return '';var m=ageMin(o);return m>=t[1]?'urgent':m>=t[0]?'warn':'';}
  function updateAges(){
    $$('#grid .card').forEach(function(el){var o=orders[el.dataset.id];if(!o)return;
      var u=urgencyOf(o);el.classList.remove('warn','urgent');if(u)el.classList.add(u);
      var a=el.querySelector('.age');if(a){a.className='age '+u;a.textContent='⏱ '+ageStr(ageMin(o));}});
    renderStats();
  }
  setInterval(function(){ if(tab==='live') updateAges(); },15000);   // refresh timers without a full re-render

  /* ---- search + type filter ---- */
  function matchesFilter(o){
    if(filterType!=='all' && o.mode!==filterType) return false;
    if(searchQ){var hay=(o.ref+' '+o.name+' '+(o.phone||'')+' '+o.items.map(function(i){return i.name;}).join(' ')).toLowerCase();
      if(hay.indexOf(searchQ)<0) return false;}
    return true;
  }
  $('#searchInp').addEventListener('input',function(){searchQ=this.value.trim().toLowerCase();renderLive();});
  $('#typeSeg').addEventListener('click',function(e){var b=e.target.closest('button[data-type]');if(!b)return;
    filterType=b.dataset.type;$$('#typeSeg button').forEach(function(x){x.classList.toggle('on',x===b);});renderLive();});

  /* ---- KPI strip ---- */
  function renderStats(){
    var act=Object.keys(orders).map(function(k){return orders[k];}).filter(function(o){return ACTIVE.indexOf(o.status)>-1;});
    var pending=act.filter(function(o){return o.status==='PENDING';}).length;
    var ready=act.filter(function(o){return o.status==='READY';}).length;
    var doneToday=completed.filter(function(o){return o.status==='COMPLETED'&&isToday(o.completedAt||o.placedAt);}).length;
    function tile(c,v,l){return '<div class="stat '+c+'"><div class="sv">'+v+'</div><div class="sl">'+esc(l)+'</div></div>';}
    $('#statbar').innerHTML=tile('amber',pending,'New · need action')+tile('gold',act.length,'Active now')+tile('green',ready,'Ready')+tile('blue',doneToday,'Done today');
  }

  /* ---- new-order sound toggle (persisted) ---- */
  function paintSound(){var b=$('#soundBtn');b.textContent=soundOn?'🔊':'🔇';b.classList.toggle('on',soundOn);}
  $('#soundBtn').addEventListener('click',function(){soundOn=!soundOn;try{sessionStorage.setItem('hh-vendor-sound',soundOn?'on':'off');}catch(e){}paintSound();if(soundOn)beep();});
  paintSound();

  /* ---- loading skeleton (shown until the first fetch resolves) ---- */
  function showSkeleton(){var g=$('#grid');g.innerHTML='';for(var i=0;i<4;i++){var d=document.createElement('div');d.className='skel';g.appendChild(d);}$('#empty').style.display='none';}
  showSkeleton();

  /* ---- actions (unchanged flow, store-scoped server-side) ---- */
  document.addEventListener('click',function(e){var b=e.target.closest('button[data-to]'); if(b){doTransition(b.dataset.id,b.dataset.to);}});
  document.addEventListener('change',function(e){var sel=e.target.closest('select[data-assign]'); if(sel&&sel.value){assign(sel.dataset.assign,sel.value);}});
  function doTransition(id,to){ api('/api/orders/'+id+'/transition',{body:{to:to}}).then(function(j){if(!j.ok){toast(j.error||'Failed');}}).catch(function(){}); }
  function assign(id,driverId){ api('/api/orders/'+id+'/assign',{body:{driverId:driverId}}).then(function(j){if(!j.ok)toast(j.error||'Failed');else toast('Driver assigned');}).catch(function(){}); }

  /* ---- tabs (#4) ---- */
  function setTab(t){ tab=t; $('#liveView').hidden=(t!=='live'); $('#doneView').hidden=(t!=='done'); $$('.navlink').forEach(function(l){l.classList.toggle('active',l.dataset.tab===t);}); if(t==='done')loadCompleted(); }
  $$('.navlink').forEach(function(l){ l.addEventListener('click',function(){ setTab(l.dataset.tab); $('#shell').classList.remove('navopen'); }); });

  /* ---- sidebar collapse (desktop) + off-canvas (mobile) ---- */
  $('#sbCollapse').addEventListener('click',function(){ var c=$('#shell').classList.toggle('collapsed'); this.style.transform=c?'rotate(180deg)':''; this.setAttribute('aria-label',c?'Expand sidebar':'Collapse sidebar'); });
  $('#hamb').addEventListener('click',function(){ $('#shell').classList.add('navopen'); });
  $('#scrim').addEventListener('click',function(){ $('#shell').classList.remove('navopen'); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ $('#shell').classList.remove('navopen'); $('#drawer').classList.remove('open'); } });

  /* ---- notifications ---- */
  var notes=[], unread=0;
  function renderNotes(){ $('#noteList').innerHTML=notes.length?notes.map(function(n){return '<div class="note">'+esc(n.text)+'<div class="t">'+tm(n.at)+'</div></div>';}).join(''):'<div class="empty">No notifications.</div>'; }
  function bumpBell(){ unread++; var n=$('#bellN'); n.style.display=''; n.textContent=unread; }
  $('#bell').addEventListener('click',function(){$('#drawer').classList.add('open');unread=0;$('#bellN').style.display='none';renderNotes();});
  $('#closeN').addEventListener('click',function(){$('#drawer').classList.remove('open');});

  /* ---- loaders ---- */
  function loadDrivers(){ return api('/api/drivers').then(function(j){if(j.ok)drivers=j.drivers;}).catch(function(){}); }
  function loadOrders(){ return api('/api/orders?scope=active').then(function(j){if(j.ok){orders={};j.orders.forEach(function(o){orders[o.id]=o;});renderLive();}}).catch(function(){}); }
  function loadCompleted(){ return api('/api/orders?scope=completed').then(function(j){if(j.ok){completed=j.orders||[];renderDone();}}).catch(function(){}); }
  function loadNotes(){ return api('/api/notifications').then(function(j){if(j.ok){notes=j.notifications;}}).catch(function(){}); }

  function connect(){
    var es=new EventSource('/api/stream?token='+encodeURIComponent(TOKEN));
    es.addEventListener('open',function(){$('#conn').className='conn live';$('#conn').querySelector('b').textContent='Live';});
    es.onerror=function(){$('#conn').className='conn';$('#conn').querySelector('b').textContent='reconnecting';};
    es.addEventListener('order.created',function(ev){var o=JSON.parse(ev.data);o._fresh=true;orders[o.id]=o;renderLive();beep();toast('New order '+o.ref);});
    es.addEventListener('order.updated',function(ev){var o=JSON.parse(ev.data);
      if(ACTIVE.indexOf(o.status)>-1){orders[o.id]=o;} else { delete orders[o.id]; }
      loadDrivers().then(renderLive);
      if(o.status==='COMPLETED'||o.status==='REJECTED'){ loadCompleted(); }
    });
    es.addEventListener('notification',function(ev){var n=JSON.parse(ev.data);notes.unshift(n);bumpBell();if(n.type==='payment'){toast(n.text);}});
  }

  loadDrivers().then(loadOrders).then(loadCompleted).then(loadNotes).then(connect);
})();
</script>
</body>
</html>
